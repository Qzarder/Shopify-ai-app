# fly.toml app configuration file generated for csv-magic-cleaner-blue-lake-2582 on 2026-03-07T21:44:19-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'csv-magic-cleaner-blue-lake-2582'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "npx prisma migrate deploy"

[env]
  PORT = '3000'
  SCOPES = 'read_products,write_products'
  SHOPIFY_API_KEY = '9c9cf8a85f64ff2e47d95faa53eb96d6'
  SHOPIFY_APP_URL = 'https://csv-magic-cleaner-blue-lake-2582.fly.dev'

[processes]
  app = "npm run start"

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

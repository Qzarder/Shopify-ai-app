<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopify CSV Magic Cleaner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden-section { display: none; }
    .loader { cursor: not-allowed; opacity: 0.7; }
    /* Анимация загрузки на кнопке */
    .loader::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      top: 0; left: 0; right: 0; bottom: 0;
      margin: auto;
      border: 3px solid transparent;
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 1s ease infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
    <div class="bg-gradient-to-r from-green-500 to-emerald-600 p-6 text-center text-white">
      <h1 class="text-2xl font-bold">Shopify CSV Cleaner</h1>
      <p class="text-sm opacity-90 mt-1">AI-powered formatting in seconds</p>
    </div>

    <div class="p-6">
      <section id="uploadSection" class="space-y-4">
        <div class="flex items-center space-x-2 text-gray-700 font-semibold mb-2">
          <span class="bg-gray-200 text-gray-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
          <h2>Upload your messy CSV</h2>
        </div>
        
        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition">
          <input type="file" id="fileInput" accept=".csv" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer" />
        </div>
        
        <button id="uploadBtn" class="w-full relative bg-gray-900 text-white py-3 rounded-lg font-medium hover:bg-gray-800 transition">
          Upload & Analyze
        </button>
        <div id="uploadMsg" class="text-sm text-center font-medium mt-2"></div>
      </section>

      <section id="paySection" class="hidden-section space-y-4 mt-8 border-t pt-6 border-gray-100">
        <div class="flex items-center space-x-2 text-gray-700 font-semibold mb-2">
          <span class="bg-green-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
          <h2>Unlock & Process</h2>
        </div>
        <div class="bg-blue-50 border border-blue-100 rounded-lg p-4 text-sm text-blue-800 text-center">
          File uploaded successfully! Pay to start AI processing.
        </div>
        <button id="payBtn" class="w-full relative bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition">
          Pay $9.99 via Stripe
        </button>
        <div id="payMsg" class="text-sm text-center font-medium mt-2"></div>
      </section>

      <section id="processSection" class="hidden-section space-y-4 mt-8 border-t pt-6 border-gray-100">
        <div class="flex items-center space-x-2 text-gray-700 font-semibold mb-2">
          <span class="bg-green-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">3</span>
          <h2>AI Magic in Progress</h2>
        </div>
        <button id="processBtn" class="w-full relative bg-gray-900 text-white py-3 rounded-lg font-medium hover:bg-gray-800 transition">
          Start AI Processing
        </button>
        <div id="processMsg" class="text-sm text-center font-medium mt-2 text-gray-600"></div>
      </section>

      <section id="downloadSection" class="hidden-section mt-6 text-center">
        <div class="bg-green-50 border border-green-200 rounded-lg p-6">
          <svg class="w-12 h-12 text-green-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <h3 class="text-green-800 font-bold mb-2">File is ready!</h3>
          <a id="downloadLink" class="inline-block w-full bg-green-500 text-white py-3 rounded-lg font-medium hover:bg-green-600 transition shadow-sm">
            Download Clean CSV
          </a>
        </div>
      </section>

    </div>
  </div>

  <script>
    // Твоя оригинальная логика сохранена на 100%
    const API = '';
    const LS_KEY = 'file_id';

    const uploadBtn = document.getElementById('uploadBtn');
    const payBtn = document.getElementById('payBtn');
    const processBtn = document.getElementById('processBtn');

    const uploadMsg = document.getElementById('uploadMsg');
    const payMsg = document.getElementById('payMsg');
    const processMsg = document.getElementById('processMsg');

    const uploadSection = document.getElementById('uploadSection');
    const paySection = document.getElementById('paySection');
    const processSection = document.getElementById('processSection');
    const downloadSection = document.getElementById('downloadSection');
    const downloadLink = document.getElementById('downloadLink');

    let fileId = localStorage.getItem(LS_KEY);

    if (fileId) {
      paySection.classList.remove('hidden-section');
      uploadSection.classList.add('opacity-50', 'pointer-events-none');
    }

    function setLoading(btn, isLoading) {
      if(isLoading) {
        btn.classList.add('loader', 'text-transparent');
      } else {
        btn.classList.remove('loader', 'text-transparent');
      }
      btn.disabled = isLoading;
    }

    uploadBtn.onclick = async () => {
      const file = document.getElementById('fileInput').files[0];
      if (!file) {
        uploadMsg.textContent = 'Please select a CSV file first';
        uploadMsg.className = 'text-sm text-center font-medium mt-2 text-red-500';
        return;
      }

      const form = new FormData();
      form.append('file', file);

      setLoading(uploadBtn, true);
      uploadMsg.textContent = '';

      try {
        const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        fileId = data.file_id;
        localStorage.setItem(LS_KEY, fileId);
        uploadMsg.textContent = 'Uploaded successfully!';
        uploadMsg.className = 'text-sm text-center font-medium mt-2 text-green-600';
        paySection.classList.remove('hidden-section');
        uploadSection.classList.add('opacity-50', 'pointer-events-none');
      } catch (e) {
        uploadMsg.textContent = 'Upload error. Please try again.';
        uploadMsg.className = 'text-sm text-center font-medium mt-2 text-red-500';
      } finally {
        setLoading(uploadBtn, false);
      }
    };

    payBtn.onclick = async () => {
      setLoading(payBtn, true);
      payMsg.textContent = '';

      try {
        const res = await fetch(`${API}/checkout/${fileId}`, { method: 'POST' });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        window.location.href = data.checkout_url;
      } catch (e) {
        payMsg.textContent = 'Payment init error. Please check backend.';
        payMsg.className = 'text-sm text-center font-medium mt-2 text-red-500';
        setLoading(payBtn, false);
      }
    };

    const params = new URLSearchParams(window.location.search);

    if (params.get('success') === '1') {
      paySection.classList.add('hidden-section');
      uploadSection.classList.add('hidden-section');
      processSection.classList.remove('hidden-section');
    }

    processBtn.onclick = async () => {
      setLoading(processBtn, true);
      processMsg.textContent = 'AI is formatting your file. Do not close this window...';
      processMsg.className = 'text-sm text-center font-medium mt-2 text-blue-600 animate-pulse';

      try {
        const res = await fetch(`${API}/process/${fileId}`, { method: 'POST' });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        downloadLink.href = data.download_url;
        downloadSection.classList.remove('hidden-section');
        processSection.classList.add('hidden-section');
      } catch (e) {
        processMsg.textContent = 'Processing error. Contact support.';
        processMsg.className = 'text-sm text-center font-medium mt-2 text-red-500';
      } finally {
        setLoading(processBtn, false);
      }
    };
  </script>
</body>
</html>
